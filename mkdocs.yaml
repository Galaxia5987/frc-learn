site_name: FRC Learn
repo_name: Galaxia5987/frc-learn
repo_url: https://github.com/Galaxia5987/frc-learn
edit_uri: edit/main/docs/
theme:
  name: material
  language: en
  palette:
    scheme: slate
  icon:
    edit: fontawesome/solid/pen
    repo: fontawesome/brands/github
  features:
    - content.action.edit
    - navigation.footer
    - content.code.copy
    - navigation.expand
markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html
  - pymdownx.blocks.caption
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

plugins:
  - awesome-pages

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js
